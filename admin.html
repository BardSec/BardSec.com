<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BardSec Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #060912;
      --panel: rgba(12, 16, 28, 0.92);
      --panel-strong: rgba(16, 22, 38, 0.98);
      --stroke: rgba(255, 255, 255, 0.08);
      --stroke-hover: rgba(255, 255, 255, 0.16);
      --text: #e9f3ff;
      --muted: #9ab2d3;
      --accent: #6ef3c5;
      --accent-2: #60a5fa;
      --danger: #f87171;
      --warn: #f59e0b;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.55);
      --radius: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--text);
      background: radial-gradient(120% 120% at 12% 18%, rgba(110, 243, 197, 0.12), transparent 35%),
                  radial-gradient(90% 90% at 80% 12%, rgba(96, 165, 250, 0.15), transparent 38%),
                  var(--ink);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ---- Login Screen ---- */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .login-box {
      background: var(--panel-strong);
      border: 1px solid var(--stroke);
      border-radius: calc(var(--radius) + 4px);
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: var(--shadow);
    }
    .login-box h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 22px;
      margin-bottom: 6px;
    }
    .login-box p { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
    .login-error {
      background: rgba(248, 113, 113, 0.12);
      border: 1px solid rgba(248, 113, 113, 0.3);
      color: var(--danger);
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }

    /* ---- Admin Shell ---- */
    #admin-shell { display: none; flex-direction: column; min-height: 100vh; }
    .admin-header {
      background: rgba(6, 9, 18, 0.88);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--stroke);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .admin-header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .admin-logo {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 17px;
      color: var(--accent);
    }
    .admin-badge {
      background: rgba(110, 243, 197, 0.12);
      color: #d4fff1;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 999px;
    }
    .admin-header-right { display: flex; gap: 10px; align-items: center; }

    /* ---- Layout ---- */
    .admin-body {
      display: flex;
      flex: 1;
    }
    .sidebar {
      width: 220px;
      flex-shrink: 0;
      border-right: 1px solid var(--stroke);
      padding: 20px 12px;
      background: rgba(8, 12, 22, 0.5);
    }
    .sidebar-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      padding: 0 8px;
      margin-bottom: 8px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      transition: background 0.15s, color 0.15s;
      margin-bottom: 2px;
    }
    .nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .nav-item.active { background: rgba(110, 243, 197, 0.1); color: var(--accent); }
    .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
    .nav-count {
      margin-left: auto;
      background: rgba(255,255,255,0.08);
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 999px;
    }

    /* ---- Main Content ---- */
    .main-content {
      flex: 1;
      padding: 28px 32px;
      overflow-y: auto;
    }
    .content-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .content-header h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 22px;
      font-weight: 700;
    }
    .content-header p { color: var(--muted); font-size: 14px; margin-top: 2px; }

    /* ---- Cards List ---- */
    .cards-list { display: flex; flex-direction: column; gap: 10px; }
    .card-row {
      background: var(--panel);
      border: 1px solid var(--stroke);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color 0.15s;
    }
    .card-row:hover { border-color: var(--stroke-hover); }
    .card-row-thumb {
      width: 72px;
      height: 42px;
      border-radius: 8px;
      background-size: cover;
      background-position: center;
      flex-shrink: 0;
      border: 1px solid var(--stroke);
      background-color: rgba(255,255,255,0.04);
    }
    .card-row-info { flex: 1; min-width: 0; }
    .card-row-title {
      font-weight: 600;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-row-meta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-row-chip {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      color: var(--muted);
      flex-shrink: 0;
    }
    .card-row-actions { display: flex; gap: 6px; flex-shrink: 0; }

    /* ---- Buttons ---- */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      font-family: inherit;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: linear-gradient(120deg, var(--accent), var(--accent-2));
      color: #032018;
      border-color: rgba(255,255,255,0.1);
    }
    .btn-primary:hover { filter: brightness(1.05); }
    .btn-ghost {
      background: rgba(255,255,255,0.05);
      color: var(--text);
      border-color: var(--stroke);
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.09); border-color: var(--stroke-hover); }
    .btn-danger {
      background: rgba(248, 113, 113, 0.1);
      color: var(--danger);
      border-color: rgba(248, 113, 113, 0.2);
    }
    .btn-danger:hover { background: rgba(248, 113, 113, 0.2); }
    .btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 8px; }
    .btn-icon { padding: 6px 8px; }

    /* ---- Form / Modal ---- */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(6, 9, 18, 0.75);
      backdrop-filter: blur(4px);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--panel-strong);
      border: 1px solid var(--stroke-hover);
      border-radius: calc(var(--radius) + 4px);
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6);
    }
    .modal-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--stroke);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-header h3 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 17px;
      font-weight: 700;
    }
    .modal-close {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--stroke);
      color: var(--muted);
      width: 30px;
      height: 30px;
      border-radius: 8px;
      cursor: pointer;
      display: grid;
      place-items: center;
      font-size: 16px;
      transition: background 0.15s, color 0.15s;
    }
    .modal-close:hover { background: rgba(255,255,255,0.1); color: var(--text); }
    .modal-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }
    .modal-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--stroke);
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    /* ---- Form Fields ---- */
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.2px;
    }
    .field input, .field textarea {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--stroke);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      transition: border-color 0.15s;
      outline: none;
      width: 100%;
    }
    .field input:focus, .field textarea:focus {
      border-color: rgba(110, 243, 197, 0.4);
    }
    .field textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
    .field-hint { font-size: 12px; color: var(--muted); }

    /* ---- Image Preview ---- */
    .img-preview {
      width: 100%;
      aspect-ratio: 16/9;
      border-radius: 10px;
      border: 1px solid var(--stroke);
      background-size: cover;
      background-position: center;
      background-color: rgba(255,255,255,0.03);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 13px;
    }

    /* ---- Confirm Dialog ---- */
    .confirm-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(6, 9, 18, 0.8);
      backdrop-filter: blur(4px);
      z-index: 300;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .confirm-backdrop.open { display: flex; }
    .confirm-box {
      background: var(--panel-strong);
      border: 1px solid rgba(248, 113, 113, 0.3);
      border-radius: var(--radius);
      padding: 28px 28px 20px;
      max-width: 360px;
      width: 100%;
      box-shadow: 0 24px 60px rgba(0,0,0,0.6);
    }
    .confirm-box h4 { font-family: 'Space Grotesk', sans-serif; font-size: 16px; margin-bottom: 8px; }
    .confirm-box p { color: var(--muted); font-size: 14px; margin-bottom: 20px; }
    .confirm-actions { display: flex; gap: 10px; justify-content: flex-end; }

    /* ---- Toast ---- */
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: rgba(16, 22, 38, 0.97);
      border: 1px solid var(--stroke-hover);
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: var(--shadow);
      z-index: 999;
      transform: translateY(80px);
      opacity: 0;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: rgba(110, 243, 197, 0.3); color: var(--accent); }
    .toast.error { border-color: rgba(248, 113, 113, 0.3); color: var(--danger); }

    /* ---- Empty State ---- */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--muted);
    }
    .empty-state .empty-icon { font-size: 36px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    /* ---- Responsive ---- */
    @media (max-width: 700px) {
      .sidebar { display: none; }
      .main-content { padding: 20px 16px; }
      .admin-header { padding: 12px 16px; }
    }
  </style>
</head>
<body>

  <!-- Login Screen -->
  <div id="login-screen">
    <div class="login-box">
      <h1>BardSec Admin</h1>
      <p>Enter your password to manage site content.</p>
      <div class="login-error" id="login-error">Incorrect password. Please try again.</div>
      <form id="login-form">
        <div class="field" style="margin-bottom: 14px;">
          <label for="password-input">Admin Password</label>
          <input type="password" id="password-input" autocomplete="current-password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 11px;">
          Sign In
        </button>
      </form>
    </div>
  </div>

  <!-- Admin Shell -->
  <div id="admin-shell">
    <header class="admin-header">
      <div class="admin-header-left">
        <span class="admin-logo">BardSec</span>
        <span class="admin-badge">Admin Panel</span>
      </div>
      <div class="admin-header-right">
        <a href="/" target="_blank" class="btn btn-ghost btn-sm">
          &#8599; View Site
        </a>
        <button class="btn btn-ghost btn-sm" id="logout-btn">Sign Out</button>
      </div>
    </header>

    <div class="admin-body">
      <aside class="sidebar">
        <div class="sidebar-label">Sections</div>
        <button class="nav-item active" data-section="projects">
          <span class="icon">&#9881;</span> Projects
          <span class="nav-count" id="count-projects">0</span>
        </button>
        <button class="nav-item" data-section="articles">
          <span class="icon">&#128196;</span> Articles
          <span class="nav-count" id="count-articles">0</span>
        </button>
        <button class="nav-item" data-section="presentations">
          <span class="icon">&#128202;</span> Presentations
          <span class="nav-count" id="count-presentations">0</span>
        </button>
        <button class="nav-item" data-section="videos">
          <span class="icon">&#9654;</span> Videos
          <span class="nav-count" id="count-videos">0</span>
        </button>
        <button class="nav-item" data-section="shop">
          <span class="icon">&#128717;</span> Books &amp; Merch
          <span class="nav-count" id="count-shop">0</span>
        </button>
      </aside>

      <main class="main-content">
        <div class="content-header">
          <div>
            <h2 id="section-title">Projects</h2>
            <p id="section-desc">Add, edit, or remove project cards.</p>
          </div>
          <button class="btn btn-primary" id="add-card-btn">
            + Add Card
          </button>
        </div>
        <div class="cards-list" id="cards-list"></div>
      </main>
    </div>
  </div>

  <!-- Edit / Add Modal -->
  <div class="modal-backdrop" id="card-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">Add Card</h3>
        <button class="modal-close" id="modal-close-btn">&times;</button>
      </div>
      <div class="modal-body" id="modal-body">
        <!-- Fields injected by JS -->
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="modal-cancel-btn">Cancel</button>
        <button class="btn btn-primary" id="modal-save-btn">Save Card</button>
      </div>
    </div>
  </div>

  <!-- Confirm Delete Dialog -->
  <div class="confirm-backdrop" id="confirm-dialog">
    <div class="confirm-box">
      <h4>Delete this card?</h4>
      <p>This will permanently remove the card from the site. This cannot be undone.</p>
      <div class="confirm-actions">
        <button class="btn btn-ghost btn-sm" id="confirm-cancel">Cancel</button>
        <button class="btn btn-danger btn-sm" id="confirm-delete">Delete</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // ---- State ----
    let content = {};
    let currentSection = 'projects';
    let editingCardId = null;
    let deleteTarget = null;

    const sectionMeta = {
      projects:      { title: 'Projects',       desc: 'Add, edit, or remove project cards.',      type: 'standard' },
      articles:      { title: 'Articles',        desc: 'Add, edit, or remove article cards.',      type: 'standard' },
      presentations: { title: 'Presentations',   desc: 'Add, edit, or remove presentation cards.', type: 'standard' },
      videos:        { title: 'Recent Videos',   desc: 'Add, edit, or remove video cards.',        type: 'video'    },
      shop:          { title: 'Books & Merch',   desc: 'Add, edit, or remove shop cards.',         type: 'standard' },
    };

    // ---- Utils ----
    function escapeHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = (type === 'success' ? '✓ ' : '✕ ') + msg;
      t.className = `toast ${type} show`;
      setTimeout(() => { t.classList.remove('show'); }, 3000);
    }

    // ---- Auth ----
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password-input').value;
      const errEl = document.getElementById('login-error');
      errEl.style.display = 'none';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });
        if (res.ok) {
          enterAdmin();
        } else {
          errEl.style.display = 'block';
          document.getElementById('password-input').value = '';
        }
      } catch {
        errEl.textContent = 'Connection error. Is the server running?';
        errEl.style.display = 'block';
      }
    });

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await fetch('/api/auth/logout', { method: 'POST' });
      document.getElementById('admin-shell').style.display = 'none';
      document.getElementById('login-screen').style.display = 'flex';
    });

    async function checkAuth() {
      try {
        const res = await fetch('/api/auth/check');
        const data = await res.json();
        if (data.authenticated) enterAdmin();
      } catch { /* not logged in */ }
    }

    async function enterAdmin() {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-shell').style.display = 'flex';
      await loadContent();
      switchSection('projects');
    }

    // ---- Content ----
    async function loadContent() {
      const res = await fetch('/api/content');
      content = await res.json();
      updateCounts();
    }

    function updateCounts() {
      Object.keys(sectionMeta).forEach(s => {
        const el = document.getElementById('count-' + s);
        if (el) el.textContent = (content[s] || []).length;
      });
    }

    function switchSection(section) {
      currentSection = section;
      const meta = sectionMeta[section];
      document.getElementById('section-title').textContent = meta.title;
      document.getElementById('section-desc').textContent = meta.desc;

      document.querySelectorAll('.nav-item').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.section === section);
      });

      renderCardsList();
    }

    document.querySelectorAll('.nav-item[data-section]').forEach(btn => {
      btn.addEventListener('click', () => switchSection(btn.dataset.section));
    });

    // ---- Render Cards List ----
    function renderCardsList() {
      const list = document.getElementById('cards-list');
      const cards = content[currentSection] || [];

      if (!cards.length) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">&#128195;</div>
            <p>No cards yet. Click <strong>+ Add Card</strong> to get started.</p>
          </div>`;
        return;
      }

      const isVideo = sectionMeta[currentSection].type === 'video';

      list.innerHTML = cards.map(card => {
        const thumbStyle = isVideo
          ? `background-image: url('https://img.youtube.com/vi/${escapeHtml(card.youtubeId)}/hqdefault.jpg')`
          : (card.image ? `background-image: url('${escapeHtml(card.image)}')` : '');
        const meta = isVideo
          ? `youtube.com/watch?v=${escapeHtml(card.youtubeId)}`
          : escapeHtml(card.link || '');

        return `
          <div class="card-row" data-id="${escapeHtml(card.id)}">
            <div class="card-row-thumb" style="${thumbStyle}"></div>
            <div class="card-row-info">
              <div class="card-row-title">${escapeHtml(card.title)}</div>
              <div class="card-row-meta">${meta}</div>
            </div>
            ${card.chip ? `<span class="card-row-chip">${escapeHtml(card.chip)}</span>` : ''}
            <div class="card-row-actions">
              <button class="btn btn-ghost btn-sm btn-icon" title="Edit" onclick="openEditModal('${escapeHtml(card.id)}')">&#9998;</button>
              <button class="btn btn-danger btn-sm btn-icon" title="Delete" onclick="openDeleteConfirm('${escapeHtml(card.id)}')">&#128465;</button>
            </div>
          </div>`;
      }).join('');
    }

    // ---- Modal Fields ----
    function buildStandardFields(card) {
      return `
        <div class="field">
          <label>Title *</label>
          <input type="text" id="f-title" value="${escapeHtml(card?.title || '')}" placeholder="Card title" required>
        </div>
        <div class="field">
          <label>Label / Chip</label>
          <input type="text" id="f-chip" value="${escapeHtml(card?.chip || '')}" placeholder="e.g. Writing, Code, Fiction">
        </div>
        <div class="field">
          <label>Description *</label>
          <textarea id="f-description" placeholder="Short description shown on the card">${escapeHtml(card?.description || '')}</textarea>
        </div>
        <div class="field">
          <label>Link URL *</label>
          <input type="url" id="f-link" value="${escapeHtml(card?.link || '')}" placeholder="https://...">
        </div>
        <div class="field">
          <label>Image URL</label>
          <input type="url" id="f-image" value="${escapeHtml(card?.image || '')}" placeholder="https://..." oninput="updateImgPreview(this.value)">
          <div class="img-preview" id="img-preview" style="${card?.image ? `background-image: url('${escapeHtml(card.image)}')` : ''}">
            ${card?.image ? '' : 'Image preview'}
          </div>
        </div>`;
    }

    function buildVideoFields(card) {
      return `
        <div class="field">
          <label>Title *</label>
          <input type="text" id="f-title" value="${escapeHtml(card?.title || '')}" placeholder="Video title" required>
        </div>
        <div class="field">
          <label>Description</label>
          <textarea id="f-description" placeholder="Short description">${escapeHtml(card?.description || '')}</textarea>
        </div>
        <div class="field">
          <label>YouTube Video ID *</label>
          <input type="text" id="f-youtubeId" value="${escapeHtml(card?.youtubeId || '')}" placeholder="e.g. dQw4w9WgXcQ" oninput="updateYtPreview(this.value)">
          <span class="field-hint">The ID is the part after <code>youtu.be/</code> or <code>?v=</code> in the YouTube URL.</span>
          <div class="img-preview" id="img-preview" style="${card?.youtubeId ? `background-image: url('https://img.youtube.com/vi/${escapeHtml(card.youtubeId)}/hqdefault.jpg')` : ''}">
            ${card?.youtubeId ? '' : 'Thumbnail preview'}
          </div>
        </div>`;
    }

    function updateImgPreview(url) {
      const el = document.getElementById('img-preview');
      if (!el) return;
      if (url) { el.style.backgroundImage = `url('${url}')`; el.textContent = ''; }
      else { el.style.backgroundImage = ''; el.textContent = 'Image preview'; }
    }

    function updateYtPreview(id) {
      const el = document.getElementById('img-preview');
      if (!el) return;
      if (id) { el.style.backgroundImage = `url('https://img.youtube.com/vi/${id}/hqdefault.jpg')`; el.textContent = ''; }
      else { el.style.backgroundImage = ''; el.textContent = 'Thumbnail preview'; }
    }

    // ---- Open Modals ----
    function openAddModal() {
      editingCardId = null;
      const isVideo = sectionMeta[currentSection].type === 'video';
      document.getElementById('modal-title').textContent = 'Add Card';
      document.getElementById('modal-body').innerHTML = isVideo ? buildVideoFields(null) : buildStandardFields(null);
      document.getElementById('card-modal').classList.add('open');
    }

    function openEditModal(id) {
      const card = (content[currentSection] || []).find(c => c.id === id);
      if (!card) return;
      editingCardId = id;
      const isVideo = sectionMeta[currentSection].type === 'video';
      document.getElementById('modal-title').textContent = 'Edit Card';
      document.getElementById('modal-body').innerHTML = isVideo ? buildVideoFields(card) : buildStandardFields(card);
      document.getElementById('card-modal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('card-modal').classList.remove('open');
      editingCardId = null;
    }

    document.getElementById('modal-close-btn').addEventListener('click', closeModal);
    document.getElementById('modal-cancel-btn').addEventListener('click', closeModal);
    document.getElementById('add-card-btn').addEventListener('click', openAddModal);

    document.getElementById('card-modal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('card-modal')) closeModal();
    });

    // ---- Save Card ----
    document.getElementById('modal-save-btn').addEventListener('click', saveCard);

    async function saveCard() {
      const isVideo = sectionMeta[currentSection].type === 'video';
      let payload = {};

      const title = document.getElementById('f-title')?.value.trim();
      if (!title) { showToast('Title is required.', 'error'); return; }

      if (isVideo) {
        const youtubeId = document.getElementById('f-youtubeId')?.value.trim();
        if (!youtubeId) { showToast('YouTube ID is required.', 'error'); return; }
        payload = {
          title,
          description: document.getElementById('f-description')?.value.trim() || '',
          youtubeId,
          link: `https://youtu.be/${youtubeId}`,
        };
      } else {
        const link = document.getElementById('f-link')?.value.trim();
        if (!link) { showToast('Link URL is required.', 'error'); return; }
        payload = {
          title,
          chip: document.getElementById('f-chip')?.value.trim() || '',
          description: document.getElementById('f-description')?.value.trim() || '',
          link,
          image: document.getElementById('f-image')?.value.trim() || '',
        };
      }

      try {
        let res;
        if (editingCardId) {
          res = await fetch(`/api/content/${currentSection}/${editingCardId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
        } else {
          res = await fetch(`/api/content/${currentSection}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
        }

        if (!res.ok) {
          const err = await res.json();
          showToast(err.error || 'Save failed.', 'error');
          return;
        }

        const data = await res.json();

        if (editingCardId) {
          const idx = content[currentSection].findIndex(c => c.id === editingCardId);
          if (idx !== -1) content[currentSection][idx] = data.card;
        } else {
          content[currentSection].push(data.card);
        }

        closeModal();
        updateCounts();
        renderCardsList();
        showToast(editingCardId ? 'Card updated.' : 'Card added.');
      } catch {
        showToast('Network error. Please try again.', 'error');
      }
    }

    // ---- Delete ----
    function openDeleteConfirm(id) {
      deleteTarget = id;
      document.getElementById('confirm-dialog').classList.add('open');
    }

    document.getElementById('confirm-cancel').addEventListener('click', () => {
      deleteTarget = null;
      document.getElementById('confirm-dialog').classList.remove('open');
    });

    document.getElementById('confirm-delete').addEventListener('click', async () => {
      if (!deleteTarget) return;
      document.getElementById('confirm-dialog').classList.remove('open');

      try {
        const res = await fetch(`/api/content/${currentSection}/${deleteTarget}`, { method: 'DELETE' });
        if (!res.ok) { showToast('Delete failed.', 'error'); return; }

        content[currentSection] = content[currentSection].filter(c => c.id !== deleteTarget);
        deleteTarget = null;
        updateCounts();
        renderCardsList();
        showToast('Card deleted.');
      } catch {
        showToast('Network error. Please try again.', 'error');
      }
    });

    // ---- Init ----
    checkAuth();
  </script>
</body>
</html>
